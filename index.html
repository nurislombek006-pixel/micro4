<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажер по Экономике</title>
    <style>
        :root {
            --bg-color: #fdfaf6;
            --card-bg: #ffffff;
            --accent-blue: #a2cffe;
            --soft-green: #d1ead1;
            --soft-red: #f4cfcf;
            --soft-yellow: #fdf3b8;
            --text-main: #5a5a5a;
            --border-color: #e2e2e2;
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; padding: 10px; line-height: 1.6; }
        .card { background: var(--card-bg); max-width: 800px; margin: 10px auto; padding: 25px; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); border: 1px solid var(--border-color); position: relative; }
        
        /* Авторизация */
        #lock-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .lock-card { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); text-align: center; max-width: 320px; width: 90%; }
        .lock-input { padding: 15px; border: 2px solid #eee; border-radius: 12px; width: 100%; box-sizing: border-box; font-size: 1.1em; text-align: center; margin-bottom: 15px; outline: none; }
        .lock-btn { background: var(--accent-blue); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1em; }

        h1 { color: #7a9eb1; text-align: center; font-weight: 300; margin-bottom: 25px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        .setting-item { margin: 10px 0; display: flex; align-items: center; justify-content: space-between; background: #fffafb; padding: 12px; border-radius: 12px; border: 1px solid #f0f0f0; }
        input[type="number"] { padding: 8px; border: 1px solid #ddd; border-radius: 8px; width: 70px; text-align: center; }

        .options { list-style: none; padding: 0; }
        .options li { background: #fff; border: 2px solid #f0f0f0; padding: 15px; margin-bottom: 10px; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .options li.selected { border-color: var(--accent-blue); background: #f0f7ff; }
        .options li.correct { background: var(--soft-green) !important; border-color: #a8d5a8 !important; }
        .options li.wrong { background: var(--soft-red) !important; border-color: #e5b3b3 !important; }
        .options li.disabled { pointer-events: none; }

        .btn { padding: 12px 20px; border: none; border-radius: 12px; font-size: 1em; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn-primary { background: var(--accent-blue); color: #fff; width: 100%; margin-bottom: 10px; }
        .btn-secondary { background: #e2e2e2; color: #666; }
        .btn-danger { background: var(--soft-red); color: #8a4a4a; padding: 8px 15px; font-size: 0.9em; }
        .btn-accept { background: #b8e986; color: #41611d; width: 100%; margin-top: 10px; }

        .sticky-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 90%; max-width: 400px; }
        .btn-floating { background: #7a9eb1; color: white; padding: 15px; border-radius: 15px; border: none; width: 100%; box-shadow: 0 5px 20px rgba(0,0,0,0.15); }

        .nav-buttons { display: flex; justify-content: space-between; margin-top: 20px; gap: 10px; }
        .fav-star { cursor: pointer; font-size: 1.5em; color: #ccc; transition: 0.2s; user-select: none; }
        .fav-star.active { color: #f1c40f; }
        .item-box { border-bottom: 1px solid #f0f0f0; padding: 20px 0; position: relative; }
        .hidden { display: none !important; }
        .timer { font-size: 1.3em; font-weight: 400; color: #b17a7a; }
    </style>
</head>
<body>

<div id="lock-screen">
    <div class="lock-card">
        <h1>🔐 Доступ</h1>
        <input type="password" id="access-key" class="lock-input" placeholder="Введите ключ">
        <button class="lock-btn" onclick="checkKey()">ОТКРЫТЬ</button>
        <p id="lock-error" style="color: #d93025; font-size: 0.9em; margin-top: 10px;" class="hidden">Неверный ключ доступа</p>
    </div>
</div>

<div id="main-content" class="hidden">
    <div id="start-screen" class="card">
        <h1>📚 Тренажер</h1>
        <div class="setting-item"><span>Вопросов в тесте:</span><input type="number" id="cfg-count" value="20"></div>
        <div class="setting-item"><span>Диапазон:</span><div><input type="number" id="cfg-start" value="1"> - <input type="number" id="cfg-end" value="300"></div></div>
        
        <button class="btn btn-primary" onclick="initTest(true)">Начать тест</button>
        <button class="btn btn-primary" onclick="initTest(false)" style="background:#e2e2e2; color:#666;">Решать без таймера</button>
        <button class="btn btn-primary" onclick="initStudy()" style="background:#d1e4f4; color:#5a7d96;">Изучить базу</button>
        <button class="btn btn-primary" onclick="showFavorites()" style="background:#fdf3b8; color:#857410;">⭐ Избранное</button>
    </div>

    <div id="test-screen" class="card hidden">
        <div class="top-bar">
            <div id="timer-display" class="timer">00:00</div>
            <button class="btn btn-danger" onclick="confirmFinish()">Завершить</button>
        </div>
        <div id="progress" style="text-align:center; color:#bbb; font-size: 0.9em; margin-bottom: 10px;"></div>
        <div class="question-box">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 10px;">
                <div id="q-text" style="font-weight:600; font-size:1.15em; margin-bottom:15px;"></div>
                <span id="fav-btn-q" class="fav-star" onclick="toggleFavCurrent()">★</span>
            </div>
            <ul id="q-options" class="options"></ul>
            <button id="accept-btn" class="btn btn-accept hidden" onclick="acceptAnswer()">Принять ответ</button>
        </div>
        <div class="nav-buttons">
            <button class="btn btn-secondary" onclick="prevQuestion()">←</button>
            <button id="next-btn" class="btn btn-primary hidden" onclick="nextQuestion()" style="width:auto; flex-grow: 1;">Дальше</button>
            <button id="skip-btn" class="btn btn-secondary" onclick="nextQuestion()" style="flex-grow: 1;">Пропустить</button>
        </div>
    </div>

    <div id="study-screen" class="card hidden">
        <h1 id="study-title">База</h1>
        <div id="study-container"></div>
        <div style="height: 100px;"></div>
        <div class="sticky-nav">
            <button class="btn-floating" onclick="location.reload()">ВЕРНУТЬСЯ В МЕНЮ</button>
        </div>
    </div>

    <div id="result-screen" class="card hidden">
        <h1>Результаты</h1>
        <h2 id="final-score" style="text-align:center; font-size:2.5em; color:#7a9eb1;"></h2>
        <div id="review-container"></div>
        <button class="btn btn-primary" onclick="location.reload()">В начало</button>
    </div>
</div>

<script>
    const TG_TOKEN = '8595875715:AAHxTY_KWyeOJCbrj7VhMk-Jz6Aq6A3XPkw';
    const TG_CHAT_ID = '5305261101';
    const AllowedKeys = ['profi2024', 'student77', 'micro123'];

    let database = [];
    let sessionQuestions = [];
    let userAnswers = [];
    let confirmed = [];
    let currentIdx = 0;
    let timeLeft = 1200;
    let timerInterval;
    let favorites = JSON.parse(localStorage.getItem('fav_questions') || '[]');

    // --- БЕЗОПАСНОСТЬ ---
    function checkKey() {
        const key = document.getElementById('access-key').value;
        if (AllowedKeys.includes(key)) {
            localStorage.setItem('access_granted', key);
            unlock(key);
        } else {
            document.getElementById('lock-error').classList.remove('hidden');
        }
    }

    function unlock(key) {
        document.getElementById('lock-screen').classList.add('hidden');
        document.getElementById('main-content').classList.remove('hidden');
        notify(key);
    }

    function notify(key) {
        const msg = `🔔 Вход на сайт!\nКлюч: ${key}\nВремя: ${new Date().toLocaleTimeString()}`;
        fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT_ID}&text=${encodeURIComponent(msg)}`);
    }

    window.onload = () => {
        const saved = localStorage.getItem('access_granted');
        if (saved && AllowedKeys.includes(saved)) unlock(saved);

        fetch('micro_tests.json').then(r => r.json()).then(data => {
            database = data;
            document.getElementById('cfg-end').value = data.length;
        });
    };

    // --- ЛОГИКА ---
    function formatText(text, i) {
        return (i + 1) + ". " + text.replace(/^\d+[\s.]*/, '').trim();
    }

    function initTest(useTimer) {
        let pool = database.slice(document.getElementById('cfg-start').value - 1, document.getElementById('cfg-end').value);
        pool.sort(() => Math.random() - 0.5);
        sessionQuestions = pool.slice(0, document.getElementById('cfg-count').value);
        userAnswers = new Array(sessionQuestions.length).fill(null);
        confirmed = new Array(sessionQuestions.length).fill(false);

        if (useTimer) startTimer();
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('test-screen').classList.remove('hidden');
        render();
    }

    function render() {
        const q = sessionQuestions[currentIdx];
        document.getElementById('progress').innerText = `Вопрос ${currentIdx + 1} из ${sessionQuestions.length}`;
        document.getElementById('q-text').innerText = formatText(q.question, currentIdx);
        document.getElementById('fav-btn-q').className = favorites.some(f => f.question === q.question) ? 'fav-star active' : 'fav-star';

        const list = document.getElementById('q-options');
        list.innerHTML = "";
        q.options.forEach((opt, i) => {
            const li = document.createElement('li');
            li.innerText = opt;
            if (confirmed[currentIdx]) {
                li.classList.add('disabled');
                if (i === q.answer) li.classList.add('correct');
                else if (i === userAnswers[currentIdx]) li.classList.add('wrong');
            } else {
                if (i === userAnswers[currentIdx]) li.classList.add('selected');
                li.onclick = () => { userAnswers[currentIdx] = i; render(); };
            }
            list.appendChild(li);
        });
        
        const hasChoice = userAnswers[currentIdx] !== null;
        const isDone = confirmed[currentIdx];
        document.getElementById('accept-btn').classList.toggle('hidden', isDone || !hasChoice);
        document.getElementById('next-btn').classList.toggle('hidden', !isDone);
        document.getElementById('skip-btn').classList.toggle('hidden', isDone);
    }

    function acceptAnswer() { confirmed[currentIdx] = true; render(); }
    function nextQuestion() { 
        if (currentIdx < sessionQuestions.length - 1) { currentIdx++; render(); } 
        else confirmFinish(); 
    }
    function prevQuestion() { if (currentIdx > 0) { currentIdx--; render(); } }

    function startTimer() {
        timerInterval = setInterval(() => {
            if (timeLeft <= 0) finish();
            let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('timer-display').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            timeLeft--;
        }, 1000);
    }

    function initStudy() { showList(database.slice(document.getElementById('cfg-start').value-1, document.getElementById('cfg-end').value), "База вопросов"); }
    function showFavorites() { showList(favorites, "⭐ Избранное"); }

    function showList(data, title) {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('study-screen').classList.remove('hidden');
        document.getElementById('study-title').innerText = title;
        const cont = document.getElementById('study-container');
        cont.innerHTML = data.length === 0 ? "<p style='text-align:center'>Пусто</p>" : "";
        data.forEach((q, i) => {
            const div = document.createElement('div');
            div.className = 'item-box';
            let opts = "";
            q.options.forEach((o, idx) => {
                opts += `<div style="margin-left:15px; font-size:0.9em; ${idx === q.answer ? 'color:#41611d; font-weight:bold;' : 'color:#999;'}">${idx === q.answer ? '✓ ' : '- '}${o}</div>`;
            });
            div.innerHTML = `<div><strong>${formatText(q.question, i)}</strong></div>${opts}
            <span class="fav-star ${favorites.some(f => f.question === q.question) ? 'active' : ''}" style="position:absolute; right:0; top:15px;" onclick="toggleFavList(this, ${JSON.stringify(q).replace(/"/g, '&quot;')})">★</span>`;
            cont.appendChild(div);
        });
    }

    function toggleFavCurrent() { toggle(sessionQuestions[currentIdx]); render(); }
    function toggleFavList(el, q) { toggle(q); el.classList.toggle('active'); }
    function toggle(q) {
        const idx = favorites.findIndex(f => f.question === q.question);
        if (idx > -1) favorites.splice(idx, 1); else favorites.push(q);
        localStorage.setItem('fav_questions', JSON.stringify(favorites));
    }

    function confirmFinish() { if (confirm("Завершить и показать результат?")) finish(); }
    function finish() {
        clearInterval(timerInterval);
        document.getElementById('test-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        let score = 0;
        const cont = document.getElementById('review-container');
        cont.innerHTML = "";
        sessionQuestions.forEach((q, i) => {
            if (userAnswers[i] === q.answer) score++;
            const d = document.createElement('div');
            d.className = 'item-box';
            d.innerHTML = `<div>${formatText(q.question, i)}</div>
            <div style="color:green; font-size:0.9em;">✓ Правильно: ${q.options[q.answer]}</div>
            ${userAnswers[i] !== q.answer && userAnswers[i] !== null ? `<div style="color:red; font-size:0.9em;">✗ Ваш ответ: ${q.options[userAnswers[i]]}</div>` : ''}`;
            cont.appendChild(d);
        });
        document.getElementById('final-score').innerText = `${score} / ${sessionQuestions.length}`;
    }
</script>
</body>
</html>
